<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嘉兴南湖机场 - 交通指南</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #f5fae8 0%, #eef5d8 50%, #e8f0d0 100%); color: #1e293b; line-height: 1.6; }
        .hero { position: relative; height: 400px; background: url('nanhu-airport.jpg') center center / cover no-repeat; display: flex; align-items: center; justify-content: center; text-align: center; color: white; overflow: hidden; }
        .hero::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(25, 50, 10, 0.40); }
        .hero-content { position: relative; z-index: 1; }
        .hero-icon { font-size: 3rem; margin-bottom: 0.75rem; }
        .hero h1 { font-size: 2.8rem; font-weight: 800; margin-bottom: 1rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); letter-spacing: 4px; }
        .hero-badges { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .hero-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); padding: 8px 20px; border-radius: 50px; font-size: 0.95rem; }
        .container { max-width: 900px; margin: 0 auto; padding: 0 20px; }
        .section { margin: 2.5rem 0; }
        .card { background: white; border-radius: 1rem; box-shadow: 0 4px 20px rgba(0,0,0,0.08); overflow: hidden; }
        .card-header { background: linear-gradient(135deg, #BCE672 0%, #e8f0d0 100%); padding: 1.25rem 2rem; color: #3a5a1c; }
        .card-header h2 { font-size: 1.5rem; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .card-body { padding: 2rem; }
        .intro-text { font-size: 1.05rem; line-height: 2; color: #475569; }
        .intro-text p { margin-bottom: 1rem; }
        .intro-text p:last-child { margin-bottom: 0; }
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; }
        .info-item { display: flex; flex-direction: column; gap: 4px; }
        .info-item-icon { font-size: 1.5rem; margin-bottom: 4px; }
        .info-item-label { font-size: 0.8rem; font-weight: 600; letter-spacing: 2px; color: #5a8a2a; }
        .info-item-value { font-size: 1rem; color: #1e293b; font-weight: 500; }
        .info-item-note { font-size: 0.85rem; color: #64748b; }
        .transport-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; }
        .transport-box { background: #f8fafc; border-radius: 0.75rem; padding: 1.25rem; text-align: center; border: 1px solid #e2e8f0; }
        .transport-box-icon { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .transport-box-label { font-size: 0.85rem; font-weight: 600; color: #64748b; margin-bottom: 0.25rem; }
        .transport-box-value { font-size: 1.1rem; font-weight: 700; color: #1e293b; }
        .transport-box-note { font-size: 0.8rem; color: #94a3b8; margin-top: 4px; }
        .back-nav { text-align: center; margin: 3rem 0 1rem; }
        .back-link { display: inline-flex; align-items: center; gap: 8px; padding: 12px 32px; background: linear-gradient(135deg, #BCE672 0%, #e8f0d0 100%); color: #3a5a1c; text-decoration: none; border-radius: 50px; font-size: 0.95rem; font-weight: 600; letter-spacing: 1px; transition: transform 0.3s, box-shadow 0.3s; box-shadow: 0 4px 15px rgba(160, 200, 80, 0.35); }
        .back-link:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(160, 200, 80, 0.45); }
        footer { text-align: center; padding: 2rem 0; color: #64748b; font-size: 0.9rem; }
        @media (max-width: 768px) { .hero { height: 300px; } .hero h1 { font-size: 2rem; letter-spacing: 2px; } .hero-icon { font-size: 2.5rem; } .card-header h2 { font-size: 1.25rem; } .card-body { padding: 1.5rem; } .info-grid { grid-template-columns: 1fr 1fr; } .transport-grid { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 480px) { .info-grid { grid-template-columns: 1fr; } .transport-grid { grid-template-columns: 1fr; } .hero-badges { flex-direction: column; align-items: center; } }
        @media print { body { background: white; } .hero { height: auto; padding: 3rem 0; } }
    </style>
</head>
<body>
    <div class="hero">
        <div class="hero-content">
            <div class="hero-icon">&#9992;&#65039;</div>
            <h1>嘉兴南湖机场</h1>
            <div class="hero-badges">
                <span class="hero-badge">&#128205; 距酒店约8公里</span>
                <span class="hero-badge">&#128663; 打车约25分钟</span>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="section">
            <div class="card">
                <div class="card-header">
                    <h2>&#128214; 站点简介</h2>
                </div>
                <div class="card-body">
                    <div class="intro-text">
                        <p>嘉兴南湖机场（本地民用机场），位于嘉兴市南湖区，距酒店约8公里。机场规模较小，航线有限，建议提前确认航班信息。暂无直达公交，建议打车前往。</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="card">
                <div class="card-header">
                    <h2>&#128663; 如何到达</h2>
                </div>
                <div class="card-body">
                    <div class="transport-grid">
                        <div class="transport-box">
                            <div class="transport-box-icon">&#128661;</div>
                            <div class="transport-box-label">打车</div>
                            <div class="transport-box-value">约25分钟</div>
                            <div class="transport-box-note">费用约30-40元</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="back-nav">
            <a href="../transport.html" class="back-link">&#8592; 返回交通列表</a>
        </div>

        <footer>
            <p>数据更新时间: 2026年3月 | 以上信息仅供参考</p>
        <p style="margin-top: 0.5rem;"><a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener" style="color: inherit; text-decoration: none;">浙ICP备2026024818号</a></p>
        </footer>
    </div>
</body>
</html>
